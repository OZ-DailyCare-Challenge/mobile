name: my_health_buddy
description: "A personal health tracking app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # ── 아이콘 ──────────────────────────────────────────
  cupertino_icons: ^1.0.8

  # ── 라우팅 ──────────────────────────────────────────
  go_router: ^15.1.2

  # ── 상태 관리 ────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── 네트워크 ─────────────────────────────────────────
  dio: ^5.8.0+1

  # ── 인증 ─────────────────────────────────────────────
  google_sign_in: ^6.2.2

  # ── 로컬 저장소 ──────────────────────────────────────
  shared_preferences: ^2.5.3

  # ── 유틸리티 ─────────────────────────────────────────
  flutter_svg: ^2.0.14        # SVG 이미지 지원
  cached_network_image: ^3.4.1 # 네트워크 이미지 캐싱
  intl: ^0.20.2               # 날짜·숫자 포맷 (한국어)
  freezed_annotation: ^3.0.0  # 불변 모델 클래스

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── 코드 생성 ────────────────────────────────────────
  build_runner: ^2.4.15
  freezed: ^3.0.0
  riverpod_generator: ^2.6.5
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  # ── 폰트 ─────────────────────────────────────────────
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.ttf
          weight: 800

  # ── 이미지 / 아이콘 ───────────────────────────────────
  assets:
    - assets/images/
    - assets/icons/
